<script>

let todosRegistos = []
let periodoAtual = "mes"
let tipoMobileAtual = "despesas"
let janelaDiasAtual = 0
let termoPesquisa = ""
let ordenacaoAtual = "data_desc"
let idRegistoEmEdicao = null

function eMobile(){
return window.matchMedia("(max-width: 820px)").matches
}

function aplicarVistaListas(){

const blocoReceitas = document.getElementById("blocoReceitas")
const blocoDespesas = document.getElementById("blocoDespesas")

if(!blocoReceitas || !blocoDespesas) return

if(!eMobile()){
blocoReceitas.style.display = "block"
blocoDespesas.style.display = "block"
return
}

blocoReceitas.style.display = tipoMobileAtual === "receitas" ? "block" : "none"
blocoDespesas.style.display = tipoMobileAtual === "despesas" ? "block" : "none"

}

function selecionarTipoMobile(tipo,botao){

tipoMobileAtual = tipo

document.querySelectorAll(".btn-tipo-mobile").forEach((b)=> b.classList.remove("ativo"))
if(botao) botao.classList.add("ativo")

aplicarVistaListas()

}

function abrirScannerFoto(){
window.location.href = "/capturar-foto"
}

function abrirDocs() {
  alert('Funcionalidade de gestão de documentos importantes (Docs) em desenvolvimento.');
}

document.getElementById("docInput").addEventListener("change",(e)=>{
if(e.target.files && e.target.files.length){
document.getElementById("formDoc").submit()
}
})

// Support safer file selection UX: button triggers the hidden file input.
const docButton = document.getElementById('docButton')
const docInput = document.getElementById('docInput')
if(docButton && docInput){
	if(!eMobile()){
		docButton.addEventListener('click', (ev)=>{
			ev.preventDefault()
			docInput.click()
		})
	}else{
		// On mobile hide the doc button and disable the hidden input
		try{ docButton.style.display = 'none' }catch(_){ }
		try{ docInput.disabled = true }catch(_){ }
	}
}

function parseDataRegisto(dataBruta){

if(!dataBruta) return null

const texto = String(dataBruta)
const dataISO = texto.includes("T") ? texto.split("T")[0] : texto
const partes = dataISO.split("-")

if(partes.length===3){
const ano = Number(partes[0])
const mes = Number(partes[1]) - 1
const dia = Number(partes[2])
if(!Number.isNaN(ano) && !Number.isNaN(mes) && !Number.isNaN(dia)){
return new Date(ano,mes,dia)
}
}

const fallback = new Date(texto)
return Number.isNaN(fallback.getTime()) ? null : fallback

}

function registoNoPeriodo(registo,periodo){

const data = parseDataRegisto(registo.data)
if(!data) return false

const agora = new Date()
const mesmoAno = data.getFullYear()===agora.getFullYear()

if(periodo==="ano"){
return mesmoAno
}

if(periodo==="mes"){
return mesmoAno && data.getMonth()===agora.getMonth()
}

if(periodo==="trimestre"){
const trimestreData = Math.floor(data.getMonth()/3)
const trimestreAtual = Math.floor(agora.getMonth()/3)
return mesmoAno && trimestreData===trimestreAtual
}

return true

}

function registoNaJanelaDias(registo,dias){

if(!dias) return true

const data = parseDataRegisto(registo.data)
if(!data) return false

const hoje = new Date()
const inicioHoje = new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate())
const inicioRegisto = new Date(data.getFullYear(),data.getMonth(),data.getDate())

const diffMs = inicioHoje.getTime() - inicioRegisto.getTime()
const diffDias = Math.floor(diffMs / 86400000)

return diffDias >= 0 && diffDias < dias

}

function registoCorrespondePesquisa(registo,termo){

if(!termo) return true

const fornecedor = String(registo.fornecedor || "").toLowerCase()
const valorTotal = Number(registo.valor_total ?? registo.valor ?? 0).toLocaleString("pt-PT",{minimumFractionDigits:2}).toLowerCase()
const valorIva = Number(registo.valor_iva ?? 0).toLocaleString("pt-PT",{minimumFractionDigits:2}).toLowerCase()
const valorSemIva = Number(registo.valor_sem_iva ?? 0).toLocaleString("pt-PT",{minimumFractionDigits:2}).toLowerCase()
const data = formatarData(registo.data).toLowerCase()

return fornecedor.includes(termo) || valorTotal.includes(termo) || valorIva.includes(termo) || valorSemIva.includes(termo) || data.includes(termo)

}

function ordenarRegistos(lista){

const copia = [...lista]

switch(ordenacaoAtual){
case "data_asc":
return copia.sort((a,b)=> (parseDataRegisto(a.data)?.getTime() || 0) - (parseDataRegisto(b.data)?.getTime() || 0))
case "valor_desc":
return copia.sort((a,b)=> Number(b.valor_total ?? b.valor ?? 0) - Number(a.valor_total ?? a.valor ?? 0))
case "valor_asc":
return copia.sort((a,b)=> Number(a.valor_total ?? a.valor ?? 0) - Number(b.valor_total ?? b.valor ?? 0))
case "fornecedor_asc":
return copia.sort((a,b)=> String(a.fornecedor || "").localeCompare(String(b.fornecedor || ""),"pt"))
case "data_desc":
default:
return copia.sort((a,b)=> (parseDataRegisto(b.data)?.getTime() || 0) - (parseDataRegisto(a.data)?.getTime() || 0))
}

}

function atualizarCards(registos){

const receitas = registos
.filter(r => (r.tipo || "").toLowerCase()==="receita")
.reduce((acc,r)=>acc + Number(r.valor_total ?? r.valor ?? 0),0)

const despesas = registos
.filter(r => (r.tipo || "").toLowerCase()!=="receita")
.reduce((acc,r)=>acc + Number(r.valor_total ?? r.valor ?? 0),0)

const saldo = receitas - despesas

const ivaRecebido = registos
.filter(r => (r.tipo || "").toLowerCase()==="receita")
.reduce((acc,r)=>acc + Number(r.valor_iva ?? 0),0)

const ivaPago = registos
.filter(r => (r.tipo || "").toLowerCase()!=="receita")
.reduce((acc,r)=>acc + Number(r.valor_iva ?? 0),0)

const saldoIva = ivaRecebido - ivaPago

document.getElementById("receitas").innerText =
Number(receitas).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

document.getElementById("despesas").innerText =
Number(despesas).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

document.getElementById("saldo").innerText =
Number(saldo).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

const prefixoIva = saldoIva < 0 ? "-" : ""
document.getElementById("iva").innerText =
prefixoIva + Math.abs(Number(saldoIva)).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

}

async function carregarDados(){

const res = await fetch("/api/registos")
todosRegistos = await res.json()

renderPeriodoAtual()

}



function renderPeriodoAtual(){

let registos = todosRegistos.filter((r)=> registoNoPeriodo(r,periodoAtual))

registos = registos.filter((r)=> registoNaJanelaDias(r,janelaDiasAtual))
registos = registos.filter((r)=> registoCorrespondePesquisa(r,termoPesquisa))
registos = ordenarRegistos(registos)

atualizarCards(registos)

const tabelaReceitas = document.getElementById("tabelaReceitas")
const tabelaDespesas = document.getElementById("tabelaDespesas")

tabelaReceitas.innerHTML = ""
tabelaDespesas.innerHTML = ""

registos.forEach(r=>{

const dataCurta = formatarData(r.data)
const valorSemIva = Number(r.valor_sem_iva ?? 0)
const valorIva = Number(r.valor_iva ?? 0)
const valorTotal = Number(r.valor_total ?? r.valor ?? 0)
const idRegisto = Number(r.id || 0)
const documentoDisponivel = r.documentoDisponivel !== false
const tituloVer = documentoDisponivel
? "Abrir documento"
: "Documento nao encontrado no servidor"
const attrsVer = `onclick="verFatura(${idRegisto})"`
const fornecedorCelula = construirFornecedorCelula(r.fornecedor)

const row = document.createElement("tr")

row.innerHTML = `
<td data-label="Data">${dataCurta}</td>
<td data-label="${(r.tipo || "").toLowerCase()==="receita" ? "Cliente" : "Fornecedor"}">${fornecedorCelula}</td>
<td data-label="Total">${valorTotal.toLocaleString('pt-PT',{minimumFractionDigits:2})}\u00A0€</td>
<td data-label="IVA">${valorIva.toLocaleString('pt-PT',{minimumFractionDigits:2})}\u00A0€</td>
<td data-label="Sem IVA">${valorSemIva.toLocaleString('pt-PT',{minimumFractionDigits:2})}\u00A0€</td>

<td class="acoes" data-label="Acoes">
<div class="acoes-linha">
<button title="${tituloVer}" aria-label="${tituloVer}" ${attrsVer} class="btn-ver">Ver</button>

<button title="Editar" aria-label="Editar" onclick="editar(${r.id})" class="btn-editar">Edit</button>

<button title="Apagar" aria-label="Apagar" onclick="apagar(${r.id})" class="btn-apagar">Apag.</button>
</div>
</td>
`

if((r.tipo || "").toLowerCase()==="receita"){
tabelaReceitas.appendChild(row)
}else{
tabelaDespesas.appendChild(row)
}

})

if(!tabelaReceitas.children.length){
tabelaReceitas.innerHTML = `<tr class="linha-vazia"><td data-label="" colspan="6">Sem receitas.</td></tr>`
}

if(!tabelaDespesas.children.length){
tabelaDespesas.innerHTML = `<tr class="linha-vazia"><td data-label="" colspan="6">Sem despesas.</td></tr>`
}

aplicarVistaListas()

}



function selecionarPeriodo(periodo,botao){

periodoAtual = periodo

// Clear any short-window filter (Hoje / 15 dias) so period selection takes effect
janelaDiasAtual = 0
document.querySelectorAll(".btn-curto").forEach(b => { b.classList.remove("ativo"); try{ b.setAttribute('aria-pressed','false') }catch(_){ } try{ b.blur && b.blur() }catch(_){ } })

document.querySelectorAll(".btn-periodo").forEach(b => b.classList.remove("ativo"))
if(botao) botao.classList.add("ativo")

renderPeriodoAtual()

}

function selecionarJanelaDias(dias,botao){

janelaDiasAtual = dias

document.querySelectorAll(".btn-curto").forEach((b)=> { b.classList.remove("ativo"); try{ b.setAttribute('aria-pressed','false') }catch(_){ } })
if(botao){ botao.classList.add("ativo"); try{ botao.setAttribute('aria-pressed','true') }catch(_){ } }

renderPeriodoAtual()

}



function formatarData(dataBruta){
  if(!dataBruta) return "-"
  const texto = String(dataBruta)
  if(texto.includes("T")){
    const dataISO = texto.split("T")[0]
    const partes = dataISO.split("-")
    if(partes.length===3){
      // Só os dois últimos dígitos do ano
      return `${partes[2]}/${partes[1]}/${partes[0].slice(-2)}`
    }
  }
  const partes = texto.split("-")
  if(partes.length===3){
    // Só os dois últimos dígitos do ano
    return `${partes[2]}/${partes[1]}/${partes[0].slice(-2)}`
  }
  return texto
}

function dataParaInputLocal(dataBruta){

const d = parseDataRegisto(dataBruta)
if(!d) return ""

const yyyy = d.getFullYear()
const mm = String(d.getMonth()+1).padStart(2,"0")
const dd = String(d.getDate()).padStart(2,"0")

return `${yyyy}-${mm}-${dd}`

}

function parseNumeroPtInput(raw){

if(raw===null || raw===undefined) return NaN

let s = String(raw).trim()
if(!s) return NaN

s = s.replace(/[^\d,.-\s]/g,"")
s = s.replace(/\s+/g,"")

const temVirgula = s.includes(",")
const temPonto = s.includes(".")

if(temVirgula && temPonto){
if(s.lastIndexOf(",") > s.lastIndexOf(".")){
s = s.replace(/\./g,"")
s = s.replace(",",".")
}else{
s = s.replace(/,/g,"")
}
}else if(temVirgula){
s = s.replace(",",".")
}

return Number(s)

}

function arredondar2(v){
return Math.round(Number(v) * 100) / 100
}

function escaparHtml(texto){
return String(texto || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/\"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function obterPrimeiroNomeFornecedor(nome){
const limpo = String(nome || "").trim().replace(/\s+/g," ")
if(!limpo) return "-"
const partes = limpo.split(/[\s,.;:/\\|\-]+/).filter(Boolean)
if(!partes.length) return limpo
return partes[0]
}

function construirFornecedorCelula(nome){
const completo = String(nome || "").trim().replace(/\s+/g," ") || "-"
const curto = obterPrimeiroNomeFornecedor(completo)
const completoSeguro = escaparHtml(completo)
const curtoSeguro = escaparHtml(curto)

return `<span class="fornecedor-nome" title="${completoSeguro}">${curtoSeguro}</span>`
}



function verFatura(id){

const registoId = Number(id)
if(!Number.isInteger(registoId) || registoId<=0){
alert("Documento indisponivel neste registo.")
return
}

const url = "/api/registos/" + registoId + "/documento?download=1"
const link = document.createElement("a")
link.href = url
link.rel = "noopener"
document.body.appendChild(link)
link.click()
link.remove()

}



async function apagar(id){

if(!confirm("Apagar este registo?")) return

const res = await fetch("/api/delete/"+id,{method:"DELETE"})
if(!res.ok){
alert("Erro ao apagar registo.")
return
}

todosRegistos = todosRegistos.filter((r)=> Number(r.id)!==Number(id))
renderPeriodoAtual()

}



async function editar(id){

const registo = todosRegistos.find((r)=> Number(r.id)===Number(id))
if(!registo){
alert("Registo nao encontrado.")
return
}

idRegistoEmEdicao = Number(registo.id)

document.getElementById("editFornecedor").value = String(registo.fornecedor || "")
document.getElementById("editData").value = dataParaInputLocal(registo.data)
document.getElementById("editValor").value = Number(registo.valor_total ?? registo.valor ?? 0)
.toLocaleString("pt-PT",{minimumFractionDigits:2,maximumFractionDigits:2})

const modal = document.getElementById("editModal")
modal.classList.add("ativo")
modal.setAttribute("aria-hidden","false")
document.getElementById("editFornecedor").focus()

}

function fecharModalEdicao(){
const modal = document.getElementById("editModal")
modal.classList.remove("ativo")
modal.setAttribute("aria-hidden","true")
idRegistoEmEdicao = null
}



carregarDados()

document.getElementById("editCancelar").addEventListener("click",fecharModalEdicao)

document.getElementById("editModal").addEventListener("click",(e)=>{
if(e.target.id==="editModal") fecharModalEdicao()
})

document.getElementById("editForm").addEventListener("submit",async(e)=>{
e.preventDefault()

if(!Number.isInteger(idRegistoEmEdicao) || idRegistoEmEdicao<=0){
alert("Registo invalido para edicao.")
return
}

const fornecedorLimpo = String(document.getElementById("editFornecedor").value || "").trim()
if(!fornecedorLimpo){
alert("Fornecedor invalido.")
return
}

const dataLimpa = String(document.getElementById("editData").value || "").trim()
if(!/^\d{4}-\d{2}-\d{2}$/.test(dataLimpa)){
alert("Data invalida. Usa o formato AAAA-MM-DD.")
return
}

const total = parseNumeroPtInput(document.getElementById("editValor").value)
if(Number.isNaN(total) || total<=0){
alert("Valor invalido.")
return
}

const registoAtual = todosRegistos.find((r)=> Number(r.id)===Number(idRegistoEmEdicao)) || {}
const valorIvaAtual = Number(registoAtual.valor_iva ?? 0)
const valorSemIvaAtual = Number(registoAtual.valor_sem_iva ?? Math.max(0,total - valorIvaAtual))
const taxaIvaAtual = valorSemIvaAtual>0 ? ((valorIvaAtual / valorSemIvaAtual) * 100) : 23
const taxaIva = Number.isFinite(taxaIvaAtual) && taxaIvaAtual>=0 && taxaIvaAtual<=100 ? taxaIvaAtual : 23

const valorSemIva = arredondar2(total / (1 + (taxaIva / 100)))
const valorIva = arredondar2(total - valorSemIva)

const res = await fetch("/api/update/"+idRegistoEmEdicao,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
fornecedor:fornecedorLimpo,
data:dataLimpa,
valor:total,
valorTotal:total,
valorSemIva,
valorIva,
taxaIva
})
})

const data = await res.json().catch(()=>({ok:false}))
if(!res.ok || !data.ok || !data.row){
alert((data && data.erro) || "Erro ao atualizar registo.")
return
}

todosRegistos = todosRegistos.map((r)=> Number(r.id)===Number(idRegistoEmEdicao) ? data.row : r)
fecharModalEdicao()
renderPeriodoAtual()
})

document.getElementById("pesquisaInput").addEventListener("input",(e)=>{
termoPesquisa = String(e.target.value || "").trim().toLowerCase()
renderPeriodoAtual()
})

window.addEventListener("resize",aplicarVistaListas)

</script>
