<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>PRM Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root{
--bg:#f3f5f9;
--surface:#ffffff;
--surface-soft:#eef2f7;
--text:#101828;
--muted:#475467;
--line:#e4e7ec;
--primary:#2563eb;
--primary-strong:#1d4ed8;
--danger:#ef4444;
--shadow:0 6px 16px rgba(16,24,40,0.08);
}

*{
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#f8fafc 0%,var(--bg) 100%);
margin:0;
color:var(--text);
}

header{
background:#111827;
color:#fff;
padding:16px 18px;
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
position:sticky;
top:0;
z-index:10;
}

header h1{
font-size:22px;
margin:0;
line-height:1.2;
}

.container{
padding:22px 18px 30px;
max-width:1200px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:14px;
margin-bottom:20px;
}

.card{
background:var(--surface);
padding:16px;
border-radius:14px;
box-shadow:var(--shadow);
min-height:108px;
}

.card h3{
margin:0;
font-size:14px;
color:var(--muted);
font-weight:700;
}

.card h2{
margin:12px 0 0;
font-size:31px;
line-height:1;
letter-spacing:-0.5px;
}

.upload{
background:var(--surface);
padding:16px;
border-radius:14px;
margin-bottom:20px;
box-shadow:var(--shadow);
}

.upload h3{
margin:0;
font-size:18px;
}

.upload-hint{
margin:10px 0 0;
font-size:13px;
color:var(--muted);
line-height:1.4;
}

.upload-actions{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:10px;
margin-top:12px;
}

#formDoc{
margin:0;
}

.auto-upload-btn{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:100%;
min-height:50px;
padding:12px 16px;
border:none;
border-radius:12px;
font-size:15px;
font-weight:700;
cursor:pointer;
overflow:hidden;
}

.btn-camera{background:var(--primary);color:#fff;}
.btn-camera:hover{background:var(--primary-strong);}

.btn-documento{background:#0f766e;color:#fff;}
.btn-documento:hover{background:#0d9488;}

.auto-upload-input{
position:absolute;
inset:0;
opacity:0;
width:100%;
height:100%;
cursor:pointer;
}

.filtros-periodo{
display:flex;
gap:8px;
margin-bottom:14px;
flex-wrap:wrap;
}

.btn-periodo{
background:var(--surface-soft);
color:#101828;
border:1px solid #d0d5dd;
padding:8px 14px;
border-radius:999px;
font-weight:700;
cursor:pointer;
font-size:14px;
}

.btn-periodo.ativo{
background:var(--primary);
color:#fff;
border-color:var(--primary-strong);
}

.tabelas-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.bloco-tabela h3{
margin:0 0 10px;
font-size:18px;
}

table{
width:100%;
border-collapse:separate;
border-spacing:0;
background:var(--surface);
box-shadow:var(--shadow);
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid var(--line);
text-align:left;
}

th{
background:#f9fafb;
font-size:13px;
text-transform:uppercase;
letter-spacing:0.3px;
color:#667085;
}

tbody tr:last-child td{
border-bottom:none;
}

button{
padding:10px 16px;
border:none;
background:var(--primary);
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

button:hover{background:var(--primary-strong);}

.logout{background:var(--danger);}
.logout:hover{background:#dc2626;}

.acoes button{
padding:10px 12px;
margin:2px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
min-width:40px;
min-height:40px;
}

.btn-ver{background:#3498db;color:white;}
.btn-editar{background:#f39c12;color:white;}
.btn-apagar{background:#e74c3c;color:white;}

.linha-vazia td{
font-style:italic;
color:#667085;
}

@media(max-width:980px){
.cards{grid-template-columns:1fr;}
.tabelas-grid{grid-template-columns:1fr;}
}

@media(max-width:820px){

header{
padding:14px;
flex-direction:column;
align-items:stretch;
}

header a{
display:block;
}

header .logout{
width:100%;
}

.container{
padding:14px 12px 24px;
}

.card{
padding:14px;
}

.card h2{
font-size:34px;
}

.upload{
padding:14px;
}

.upload-actions{
grid-template-columns:1fr;
}

table,
thead,
tbody,
th,
td,
tr{
display:block;
}

thead{
display:none;
}

tbody{
display:grid;
gap:10px;
padding:8px;
}

tbody tr{
background:#fff;
border:1px solid var(--line);
border-radius:12px;
padding:8px 10px;
}

td{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
padding:8px 4px;
border-bottom:1px dashed var(--line);
}

td:last-child{
border-bottom:none;
}

td::before{
content:attr(data-label);
font-size:12px;
font-weight:700;
color:#667085;
text-transform:uppercase;
letter-spacing:0.2px;
}

td.acoes{
display:block;
}

td.acoes::before{
display:block;
margin-bottom:8px;
}

td.acoes button{
min-width:54px;
min-height:44px;
font-size:19px;
}

.linha-vazia td{
display:block;
text-align:left;
padding:6px 2px;
border-bottom:none;
}

.linha-vazia td::before{
display:none;
}

}

</style>

</head>



<body>

<header>

<h1>PRM Dashboard</h1>

<a href="/logout">
<button class="logout">Logout</button>
</a>

</header>


<div class="container">


<div class="cards">

<div class="card">
<h3>Receitas</h3>
<h2 id="receitas">0 €</h2>
</div>

<div class="card">
<h3>Despesas</h3>
<h2 id="despesas">0 €</h2>
</div>

<div class="card">
<h3>Saldo</h3>
<h2 id="saldo">0 €</h2>
</div>

</div>



<div class="upload">

<h3>Carregar Fatura</h3>

<div class="upload-actions">
<button type="button" class="auto-upload-btn btn-camera" onclick="abrirScannerFoto()">Foto (Scan)</button>

<form id="formDoc" action="/upload" method="POST" enctype="multipart/form-data">
<button type="button" class="auto-upload-btn btn-documento">
Documento/PDF
<input id="docInput" class="auto-upload-input" type="file" name="file" accept="application/pdf" required>
</button>
</form>
</div>

<p class="upload-hint">Foto (Scan) abre a camara com moldura para focar o documento. Documento/PDF abre apenas ficheiros PDF.</p>

</div>


<h3>Registos</h3>

<div class="filtros-periodo">
<button type="button" class="btn-periodo ativo" onclick="selecionarPeriodo('mes', this)">Mes</button>
<button type="button" class="btn-periodo" onclick="selecionarPeriodo('trimestre', this)">Trimestre</button>
<button type="button" class="btn-periodo" onclick="selecionarPeriodo('ano', this)">Ano</button>
</div>

<div class="tabelas-grid">

<div class="bloco-tabela">
<h3>Receitas</h3>
<table>
<thead>
<tr>
<th>Data</th>
<th>Fornecedor</th>
<th>Valor</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaReceitas"></tbody>
</table>
</div>

<div class="bloco-tabela">
<h3>Despesas</h3>
<table>
<thead>
<tr>
<th>Data</th>
<th>Fornecedor</th>
<th>Valor</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaDespesas"></tbody>
</table>
</div>

</div>


</div>



<script>

let todosRegistos = []
let periodoAtual = "mes"

function abrirScannerFoto(){
window.location.href = "/capturar-foto"
}

document.getElementById("docInput").addEventListener("change",(e)=>{
if(e.target.files && e.target.files.length){
document.getElementById("formDoc").submit()
}
})

function parseDataRegisto(dataBruta){

if(!dataBruta) return null

const texto = String(dataBruta)
const dataISO = texto.includes("T") ? texto.split("T")[0] : texto
const partes = dataISO.split("-")

if(partes.length===3){
const ano = Number(partes[0])
const mes = Number(partes[1]) - 1
const dia = Number(partes[2])
if(!Number.isNaN(ano) && !Number.isNaN(mes) && !Number.isNaN(dia)){
return new Date(ano,mes,dia)
}
}

const fallback = new Date(texto)
return Number.isNaN(fallback.getTime()) ? null : fallback

}

function registoNoPeriodo(registo,periodo){

const data = parseDataRegisto(registo.data)
if(!data) return false

const agora = new Date()
const mesmoAno = data.getFullYear()===agora.getFullYear()

if(periodo==="ano"){
return mesmoAno
}

if(periodo==="mes"){
return mesmoAno && data.getMonth()===agora.getMonth()
}

if(periodo==="trimestre"){
const trimestreData = Math.floor(data.getMonth()/3)
const trimestreAtual = Math.floor(agora.getMonth()/3)
return mesmoAno && trimestreData===trimestreAtual
}

return true

}

function atualizarCards(registos){

const receitas = registos
.filter(r => (r.tipo || "").toLowerCase()==="receita")
.reduce((acc,r)=>acc + Number(r.valor || 0),0)

const despesas = registos
.filter(r => (r.tipo || "").toLowerCase()!=="receita")
.reduce((acc,r)=>acc + Number(r.valor || 0),0)

const saldo = receitas - despesas

document.getElementById("receitas").innerText =
Number(receitas).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

document.getElementById("despesas").innerText =
Number(despesas).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

document.getElementById("saldo").innerText =
Number(saldo).toLocaleString('pt-PT',{minimumFractionDigits:2}) + " €"

}

async function carregarDados(){

const res = await fetch("/api/registos")
todosRegistos = await res.json()

renderPeriodoAtual()

}



function renderPeriodoAtual(){

const registos = todosRegistos.filter(r => registoNoPeriodo(r,periodoAtual))

atualizarCards(registos)

const tabelaReceitas = document.getElementById("tabelaReceitas")
const tabelaDespesas = document.getElementById("tabelaDespesas")

tabelaReceitas.innerHTML = ""
tabelaDespesas.innerHTML = ""

registos.forEach(r=>{

const dataCurta = formatarData(r.data)

const row = document.createElement("tr")

row.innerHTML = `
<td data-label="Data">${dataCurta}</td>
<td data-label="Fornecedor">${r.fornecedor}</td>
<td data-label="Valor">${Number(r.valor).toLocaleString('pt-PT',{minimumFractionDigits:2})} €</td>

<td class="acoes" data-label="Acoes">

<button onclick="verFatura('${r.ficheiro}')" class="btn-ver">👁</button>

<button onclick="editar(${r.id})" class="btn-editar">✏️</button>

<button onclick="apagar(${r.id})" class="btn-apagar">🗑</button>

</td>
`

if((r.tipo || "").toLowerCase()==="receita"){
tabelaReceitas.appendChild(row)
}else{
tabelaDespesas.appendChild(row)
}

})

if(!tabelaReceitas.children.length){
tabelaReceitas.innerHTML = `<tr class="linha-vazia"><td data-label="">Sem receitas.</td></tr>`
}

if(!tabelaDespesas.children.length){
tabelaDespesas.innerHTML = `<tr class="linha-vazia"><td data-label="">Sem despesas.</td></tr>`
}

}



function selecionarPeriodo(periodo,botao){

periodoAtual = periodo

document.querySelectorAll(".btn-periodo").forEach(b => b.classList.remove("ativo"))
botao.classList.add("ativo")

renderPeriodoAtual()

}



function formatarData(dataBruta){

if(!dataBruta) return "-"

const texto = String(dataBruta)

if(texto.includes("T")){
const dataISO = texto.split("T")[0]
const partes = dataISO.split("-")
if(partes.length===3){
return `${partes[2]}/${partes[1]}/${partes[0]}`
}
}

const partes = texto.split("-")
if(partes.length===3){
return `${partes[2]}/${partes[1]}/${partes[0]}`
}

return texto

}



function verFatura(ficheiro){

window.open("/uploads/"+ficheiro,"_blank")

}



async function apagar(id){

if(!confirm("Apagar este registo?")) return

await fetch("/api/delete/"+id,{method:"DELETE"})

location.reload()

}



function editar(id){

const novoValor = prompt("Novo valor")

if(!novoValor) return

fetch("/api/update/"+id,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({valor:novoValor})
})
.then(()=>location.reload())

}



carregarDados()

</script>


</body>
</html>
