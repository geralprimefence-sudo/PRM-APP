<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Relatorio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}
header{
background:#1f2937;
color:#fff;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}
.container{
padding:30px;
}
.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}
.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
min-width:220px;
flex:1;
}
h2{
margin:0;
font-size:28px;
}
table{
width:100%;
border-collapse:collapse;
background:#fff;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}
th{
background:#f0f0f0;
}
button{
padding:10px 16px;
border:none;
background:#2563eb;
color:#fff;
border-radius:5px;
cursor:pointer;
}
button.logout{
background:#ef4444;
}
@media(max-width:700px){
.cards{flex-direction:column;}
table{font-size:14px;}
}
</style>
</head>

<body>
<header>
<h1>Relatorio</h1>
<div>
<a href="/dashboard"><button>Dashboard</button></a>
<a href="/logout"><button class="logout">Logout</button></a>
<button style="margin-left:8px;background:#111827;color:#fff;" onclick="exportRegistos('pdf')">Exportar PDF</button>
<button style="margin-left:6px;background:#0f172a;color:#fff;" onclick="exportRegistos('csv')">Exportar Excel</button>
</div>
</header>

<div class="container">
<div class="cards">
<div class="card">
<h3>Total Receitas</h3>
<h2 id="receitas">0,00 EUR</h2>
</div>
<div class="card">
<h3>Total Despesas</h3>
<h2 id="despesas">0,00 EUR</h2>
</div>
<div class="card">
<h3>Saldo</h3>
<h2 id="saldo">0,00 EUR</h2>
</div>
</div>

<h3>Ultimos Registos</h3>
<table>
<thead>
<tr>
<th>Data</th>
<th>Fornecedor</th>
<th>Tipo</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="linhas"></tbody>
</table>
</div>

<script>
function eur(v){
return Number(v).toLocaleString("pt-PT", { minimumFractionDigits: 2 }) + " EUR"
}

async function carregar(){
const [dRes, rRes] = await Promise.all([
fetch("/api/dashboard"),
fetch("/api/registos")
])

if(!dRes.ok || !rRes.ok){
return
}

const dashboard = await dRes.json()
const registos = await rRes.json()

const receitas = Number(dashboard.receitas || 0)
const despesas = Number(dashboard.despesas || 0)

document.getElementById("receitas").textContent = eur(receitas)
document.getElementById("despesas").textContent = eur(despesas)
document.getElementById("saldo").textContent = eur(receitas - despesas)

const linhas = document.getElementById("linhas")
linhas.innerHTML = ""

registos.slice(0, 20).forEach((r) => {
const tr = document.createElement("tr")
tr.innerHTML = `
<td>${r.data}</td>
<td>${r.fornecedor}</td>
<td>${r.tipo}</td>
<td>${eur(r.valor)}</td>
`
linhas.appendChild(tr)
})
}

carregar()
</script>
<script>
function exportRegistos(format, tipo){
		let url = `/api/export?format=${encodeURIComponent(format)}`
		if(tipo){ url += `&tipo=${encodeURIComponent(tipo)}` }
		window.location.href = url
}

function openExportModalRel(){
		const modal = document.getElementById('exportModalRel')
		if(modal) modal.style.display = 'block'
}

function closeExportModalRel(){
		const modal = document.getElementById('exportModalRel')
		if(modal) modal.style.display = 'none'
}

function submitExportFromModalRel(){
		const tipo = document.querySelector('input[name="exportTipoRel"]:checked')?.value || ''
		const format = document.querySelector('input[name="exportFormatRel"]:checked')?.value || 'csv'
		closeExportModalRel()
		exportRegistos(format, tipo)
}
</script>

<!-- Export modal for relatorio -->
<div id="exportModalRel" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
	<div style="background:#fff;padding:18px;border-radius:8px;max-width:420px;margin:40px auto;">
		<h3>Exportar</h3>
		<div style="margin-top:8px;">
			<label style="display:block;margin-bottom:6px;"><input type="radio" name="exportTipoRel" value="" checked> Ambos (Receitas + Despesas)</label>
			<label style="display:block;margin-bottom:6px;"><input type="radio" name="exportTipoRel" value="receita"> Receitas</label>
			<label style="display:block;margin-bottom:6px;"><input type="radio" name="exportTipoRel" value="despesa"> Despesas</label>
		</div>
		<div style="margin-top:12px;">
			<label style="display:block;margin-bottom:6px;"><input type="radio" name="exportFormatRel" value="excel" checked> Excel (XLSX)</label>
			<label style="display:block;margin-bottom:6px;"><input type="radio" name="exportFormatRel" value="pdf"> PDF</label>
		</div>
		<div style="margin-top:14px;text-align:right;">
			<button onclick="closeExportModalRel()" style="margin-right:8px;">Cancelar</button>
			<button onclick="submitExportFromModalRel()" style="background:#0f172a;color:#fff;padding:6px 12px;border-radius:6px;">Exportar</button>
		</div>
	</div>
</div>
</body>

</html>
