services:
  - type: web
    name: faturas-app
    runtime: node
    plan: starter
    disk:
      name: uploads-disk
      mountPath: /var/data
      sizeGB: 5
    buildCommand: npm install && (npm run smoke:docs:baseline && npm run smoke:docs:strict || echo "Smoke check falhou no build, deploy continua")
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: UPLOADS_DIR
        value: /var/data/uploads
  - type: web
    name: paddleocr-service
    runtime: docker
    plan: starter
    rootDir: paddleocr-service
    autoDeploy: true
    envVars: []
