services:
  - type: web
    name: faturas-app
    runtime: node
    plan: starter
    buildCommand: npm install && (npm run smoke:docs:baseline && npm run smoke:docs:strict || echo "Smoke check falhou no build, deploy continua")
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
