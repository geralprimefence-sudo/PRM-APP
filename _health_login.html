<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="login-container">

<img src="/logo.png">

<div id="mensagem" class="form-message hidden"></div>

<form id="loginForm" action="/login" method="POST">

<input id="usernameInput" type="text" name="username" placeholder="Utilizador" required>

<div class="password-wrap">
<input id="passwordInput" type="password" name="password" placeholder="Password" required>
<button id="togglePasswordBtn" type="button" class="toggle-password" aria-label="Mostrar password">Ver</button>
</div>

<button type="submit">Entrar</button>

</form>

<p class="form-link">Ainda nao tens conta? <a href="/register">Criar conta</a></p>

</div>

<script>
const params = new URLSearchParams(window.location.search)
const erro = params.get("error")
const username = params.get("username")
const mensagem = document.getElementById("mensagem")
const usernameInput = document.getElementById("usernameInput")
const loginForm = document.getElementById("loginForm")
const passwordInput = document.getElementById("passwordInput")
const togglePasswordBtn = document.getElementById("togglePasswordBtn")

if(erro){
mensagem.textContent = erro
mensagem.classList.remove("hidden")
mensagem.classList.add("error")
}

if(username){
usernameInput.value = username
}

togglePasswordBtn.addEventListener("click", () => {
const visivel = passwordInput.type === "text"
passwordInput.type = visivel ? "password" : "text"
togglePasswordBtn.textContent = visivel ? "Ver" : "Ocultar"
togglePasswordBtn.setAttribute("aria-label", visivel ? "Mostrar password" : "Ocultar password")
})

loginForm.addEventListener("submit", async (e) => {
e.preventDefault()

mensagem.classList.add("hidden")
mensagem.classList.remove("error")

const formData = new FormData(loginForm)
const body = new URLSearchParams(formData)

const response = await fetch("/login", {
method: "POST",
headers: {
"Content-Type": "application/x-www-form-urlencoded",
"x-requested-with": "fetch-login"
},
body
})

const data = await response.json().catch(() => ({ ok: false, error: "Username ou password errada" }))

if(data.ok && data.redirect){
window.location.href = data.redirect
return
}

mensagem.textContent = data.error || "Username ou password errada"
mensagem.classList.remove("hidden")
mensagem.classList.add("error")
})
</script>

</body>

</html>
