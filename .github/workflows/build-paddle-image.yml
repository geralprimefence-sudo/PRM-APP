name: Build and publish PaddleOCR image

on:
  push:
    branches: [ feat/paddle-docker, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v4
      with:
        context: ./paddleocr-service
        file: ./paddleocr-service/Dockerfile.paddle
        # Force build for amd64 to ensure prebuilt manylinux wheels are available
        platforms: linux/amd64
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/paddleocr-service:staging
        cache-from: type=gha
        cache-to: type=gha,mode=max
