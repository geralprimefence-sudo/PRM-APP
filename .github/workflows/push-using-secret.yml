name: Create push-test PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (use GITHUB_TOKEN)
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create push-test file on new branch
        id: create
        run: |
          mkdir -p .github
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          BRANCH="push-test-${TIMESTAMP}"
          echo "BRANCH=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Last run: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/push-test.txt
          git checkout -b ${BRANCH}
          # .github/push-test.txt may be ignored; force add to ensure commit succeeds
          git add -f .github/push-test.txt
          git commit -m "chore: add push-test file"
          git push --set-upstream origin ${BRANCH}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(jq -r '.outputs.BRANCH' <<< "$GITHUB_OUTPUT" || echo "push-test-$(date -u +'%Y%m%dT%H%M%SZ')")
          # Create PR via REST API
          API_URL="https://api.github.com/repos/${{ github.repository }}/pulls"
          DATA=$(jq -n --arg title "chore: add push-test (${BRANCH})" --arg head "$BRANCH" --arg base "${{ github.ref_name || 'main' }}" --arg body "Automated push-test created by workflow" '{title: $title, head: $head, base: $base, body: $body}')
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$API_URL" -d "$DATA" | jq '.html_url'

