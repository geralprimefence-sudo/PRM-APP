name: Push using PAT

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create or update push-test file
        run: |
          echo "Last run: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > push-test.txt

      - name: Commit changes
        run: |
          git add push-test.txt
          git commit -m "chore: update push-test" || echo "No changes to commit"

      - name: Push using PAT
        env:
          PAT: ${{ secrets.MY_PAT }}
        run: |
          git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          git push origin HEAD
