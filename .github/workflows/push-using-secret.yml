name: Create push-test PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout (use GITHUB_TOKEN)
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create push-test file on new branch
        id: create
        run: |
          mkdir -p .github
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          BRANCH="push-test-${TIMESTAMP}"
          echo "BRANCH=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Last run: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/push-test.txt
          git checkout -b ${BRANCH}
          # .github/push-test.txt may be ignored; force add to ensure commit succeeds
          git add -f .github/push-test.txt
          git commit -m "chore: add push-test file"
          git push --set-upstream origin ${BRANCH}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.create.outputs.BRANCH }}"
          echo "Creating PR for branch: $BRANCH"
          gh pr create --title "chore: add push-test (${BRANCH})" --head "$BRANCH" --base "main" --body "Automated push-test created by workflow" --repo "${{ github.repository }}"

