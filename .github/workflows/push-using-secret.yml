name: Create push-test PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Checkout (use GITHUB_TOKEN)
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create push-test file on new branch
        id: create
        run: |
          mkdir -p .github
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          BRANCH="push-test-${TIMESTAMP}"
          echo "BRANCH=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Last run: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/push-test.txt
          git checkout -b ${BRANCH}
          # .github/push-test.txt may be ignored; force add to ensure commit succeeds
          git add -f .github/push-test.txt
          git commit -m "chore: add push-test file"
          git push --set-upstream origin ${BRANCH}

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_PAT: ${{ secrets.ACTIONS_PAT }}
        run: |
          set -euo pipefail
          BRANCH="${{ steps.create.outputs.BRANCH }}"
          echo "Creating PR for branch: $BRANCH"
          # debug: confirm whether ACTIONS_PAT is present (will not print the value)
          if [ -n "$ACTIONS_PAT" ]; then
            echo "DEBUG: ACTIONS_PAT is present"
          else
            echo "DEBUG: ACTIONS_PAT is NOT present"
          fi
          # Try using gh to create PR and return JSON with URL
          PR_URL=$(gh pr create --title "chore: add push-test (${BRANCH})" --head "$BRANCH" --base "main" --body "Automated push-test created by workflow" --repo "${{ github.repository }}" --json url -q .url 2>/dev/null || true)
          if [ -n "$PR_URL" ]; then
            echo "PR created: $PR_URL"
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          else
            echo "gh did not return a URL; attempting REST fallback"
            API_URL="https://api.github.com/repos/${{ github.repository }}/pulls"
            DATA=$(jq -n --arg title "chore: add push-test (${BRANCH})" --arg head "$BRANCH" --arg base "main" --arg body "Automated push-test created by workflow" '{title: $title, head: $head, base: $base, body: $body}')
            if [ -n "$ACTIONS_PAT" ]; then
              AUTH_HEADER="Authorization: Bearer $ACTIONS_PAT"
              echo "Using repository secret ACTIONS_PAT for REST call"
            else
              AUTH_HEADER="Authorization: Bearer $GITHUB_TOKEN"
              echo "ACTIONS_PAT not set; falling back to GITHUB_TOKEN (may be disallowed by repo settings)"
            fi
            HTTP_STATUS=$(curl -s -o /tmp/pr_resp -w "%{http_code}" -X POST -H "$AUTH_HEADER" -H "Accept: application/vnd.github+json" "$API_URL" -d "$DATA" )
            echo "REST HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" -ge 200 -a "$HTTP_STATUS" -lt 300 ]; then
              PR_URL=$(jq -r '.html_url' /tmp/pr_resp || true)
              echo "PR created (REST): $PR_URL"
              echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            else
              echo "REST PR creation failed (status=$HTTP_STATUS)"
              cat /tmp/pr_resp || true
              exit 1
            fi
          fi

